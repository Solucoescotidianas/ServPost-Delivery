<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fila Flota Cáceres</title>
    <style>
        :root { --bk-orange: #ff8000; --popeyes-red: #e60000; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        h1 { color: var(--bk-orange); font-size: 1.5rem; text-transform: uppercase; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; box-sizing: border-box; margin-bottom: 20px; }
        select, button { width: 100%; padding: 18px; margin: 10px 0; border-radius: 10px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        select { background: #333; color: white; }
        .btn-llegue { background: var(--bk-orange); color: white; }
        .btn-salgo { background: var(--popeyes-red); color: white; margin-top: 5px; }
        .btn-llegue:active, .btn-salgo:active { opacity: 0.7; transform: scale(0.98); }
        h3 { border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 0; }
        .fila-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #333; }
        .pos { background: var(--bk-orange); color: black; padding: 5px 10px; border-radius: 50%; font-weight: bold; margin-right: 15px; }
        .nombre { flex-grow: 1; font-size: 1.2rem; }
        .hora { color: #888; font-size: 0.9rem; }
        #loading { font-style: italic; color: var(--bk-orange); }
    </style>
</head>
<body>

    <div class="container">
        <h1>📍 Fila BK / Popeyes</h1>
        
        <div class="card">
            <label>Selecciona tu nombre:</label>
            <select id="repartidor">
                <option>VICENTE</option><option>JOSWIL</option><option>DARWIN</option>
                <option>OSCAR</option><option>FERNANDO</option><option>JEAN WON</option>
                <option>JUAN</option><option>ANTONI</option><option>HENRY</option>
                <option>RAUDIEL</option><option>ALEJANDRO</option><option>URIEL</option>
                <option>JAIRO</option><option>ALEX</option><option>DURAN</option>
            </select>
            <button class="btn-llegue" onclick="enviar('llegue')">ENTRAR EN FILA</button>
            <button class="btn-salgo" onclick="enviar('salgo')">SALIR A REPARTO</button>
        </div>

        <div class="card">
            <h3>📋 ORDEN DE VEZ</h3>
            <div id="lista-fila"><span id="loading">Actualizando fila...</span></div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyiPcxG5yKphHH-CNS2g04x905KAt9mpWgi3eb_aS80wMk--1yOUyjxx30-FGHlyVkj0g/exec';

        async function cargarFila() {
            try {
                const response = await fetch(scriptURL);
                const datos = await response.json();
                const div = document.getElementById('lista-fila');
                div.innerHTML = '';
                
                if (datos.length === 0) {
                    div.innerHTML = '<p style="color:#666">No hay nadie en la base.</p>';
                    return;
                }

                datos.forEach((item, index) => {
                    const horaFormateada = new Date(item.hora).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    div.innerHTML += `
                        <div class="fila-item">
                            <span class="pos">${index + 1}</span>
                            <span class="nombre">${item.nombre}</span>
                            <span class="hora">${horaFormateada}</span>
                        </div>`;
                });
            } catch (e) {
                document.getElementById('loading').innerText = "Error al conectar.";
            }
        }

        async function enviar(accion) {
            const nombre = document.getElementById('repartidor').value;
            const btn = event.target;
            const originalText = btn.innerText;
            
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', // Necesario para Google Apps Script
                    body: JSON.stringify({nombre, accion})
                });
                // Esperamos un segundo para que Google procese y recargamos
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    cargarFila();
                }, 1500);
            } catch (e) {
                alert("Error al enviar. Intenta de nuevo.");
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        // Cargar la fila al abrir y cada 30 segundos
        cargarFila();
        setInterval(cargarFila, 30000);
    </script>
</body>
</html>
