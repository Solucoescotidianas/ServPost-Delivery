</head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIPOST - Gestión de Fila</title>
    <style>
        :root { 
            --verde: #8cc63f; 
            --negro: #0d0d0d; 
            --gris: #1a1a1a; 
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--negro); 
            color: white; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { width: 100%; max-width: 420px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header img { max-width: 160px; margin-bottom: 10px; }
        
        .card { 
            background: var(--gris); 
            padding: 20px; 
            border-radius: 18px; 
            border: 1px solid #333; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.8rem; 
            color: var(--verde); 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        
        select, button { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border: none; 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer; 
        }
        
        select { background: #2a2a2a; color: white; border: 1px solid #444; appearance: none; }
        
        .btn-entrar { background: var(--verde); color: black; }
        .btn-salir { background: transparent; color: #ff4444; border: 2px solid #ff4444; }
        .btn-regreso { background: #ffffff; color: #000000; border: 2px solid var(--verde); }
        
        h3 { 
            color: var(--verde); 
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
            text-align: center; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
        }
        
        .fila-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #2a2a2a; 
        }
        
        .pos { 
            background: var(--verde); 
            color: black; 
            min-width: 25px; 
            height: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 6px; 
            font-weight: bold; 
            margin-right: 12px; 
        }
        
        .info { flex-grow: 1; }
        .nombre { font-size: 1rem; font-weight: 600; display: block; }
        .tag { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .hora { color: #555; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="icon-512.png" alt="SERVIPOST">
            <h2 style="color: var(--verde); font-size: 1.2rem; margin:0;">CONTROL DE FILA</h2>
        </div>
        
        <div class="card">
            <label>Repartidor:</label>
            <select id="repartidor">
                <option>ALEJANDRO</option><option>ALEX</option><option>ANTONI</option>
                <option>DARWIN</option><option>DURAN</option><option>FERNANDO</option>
                <option>HENRY</option><option>JAIRO</option><option>JEAN WON</option>
                <option>JOSWIL</option><option>JUAN</option><option>OSCAR</option>
                <option>RAUDIEL</option><option>URIEL</option><option>VICENTE</option>
            </select>

            <label>Establecimiento:</label>
            <select id="fila_destino">
                <option value="Burger King">BURGER KING 🍔</option>
                <option value="Popeyes">POPEYES 🍗</option>
            </select>

            <button class="btn-entrar" onclick="enviar('llegue', this)">ENTRAR EN FILA</button>
            <button class="btn-salir" onclick="enviar('salgo', this)">SALIR A REPARTO</button>
            <button class="btn-regreso" onclick="enviar('regreso', this)">REGRESAR A BASE</button>
        </div>

        <div class="card">
            <h3>📋 ORDEN ACTUAL EN BASE</h3>
            <div id="lista-fila" style="text-align:center; color:var(--verde);">Sincronizando...</div>
        </div>
    </div>

    <script>
        // Tu URL de Google Apps Script actualizada
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwlI3SbkCKPGyHgJ4V51dLVsACW_10B359NCj3N59oa2HIrFzdvks8upMbu54ERPyn5JA/exec';

        async function cargarFila() {
            try {
                const response = await fetch(scriptURL);
                const datos = await response.json();
                const div = document.getElementById('lista-fila');
                
                if (datos.length === 0) {
                    div.innerHTML = '<p style="color:#666; margin:10px 0;">No hay nadie en base.</p>';
                    return;
                }

                div.innerHTML = '';
                datos.forEach((item, index) => {
                    const horaF = new Date(item.hora).toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'});
                    div.innerHTML += `
                        <div class="fila-item">
                            <span class="pos">${index + 1}</span>
                            <div class="info">
                                <span class="nombre">${item.nombre}</span>
                                <span class="tag">${item.fila || 'General'}</span>
                            </div>
                            <span class="hora">${horaF}</span>
                        </div>`;
                });
            } catch (e) { 
                console.error("Error al cargar:", e); 
            }
        }

        async function enviar(accion, btn) {
            const nombre = document.getElementById('repartidor').value;
            const fila = document.getElementById('fila_destino').value;
            const originalText = btn.innerText;
            
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            try {
                await fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({nombre, accion, fila}) 
                });
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    cargarFila();
                }, 1500);
            } catch (e) { 
                alert("Error de conexión"); 
                btn.disabled = false; 
                btn.innerText = originalText; 
            }
        }

        // Actualizar automáticamente cada 20 segundos
        cargarFila();
        setInterval(cargarFila, 20000);
    </script>
</body>
</html>
